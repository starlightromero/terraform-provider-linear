"""
A comment thread that is synced with an external source such as Slack, Jira,
GitHub, Salesforce, or email. Provides information about the external thread's
origin, its current sync status, and whether the user has the necessary personal
integration connected to participate in the thread.
"""
type SyncedExternalThread {
  """
  The unique identifier of this synced external thread. Auto-generated if not provided.
  """
  id: ID

  """
  The category of the external source (e.g., 'integration' for service integrations, 'email' for email-based threads).
  """
  type: String!

  """
  The specific integration service for the external source (e.g., 'slack',
  'jira', 'github', 'salesforce'). Null if the source type does not have a sub-type.
  """
  subType: String

  """
  A human-readable display name for the external source (e.g., 'Slack', 'Jira', 'GitHub').
  """
  name: String

  """
  A human-readable display name for the thread, derived from the external
  source. For Slack threads this is the channel name, for Jira it's the issue
  key, for email it's the sender name and count of other participants.
  """
  displayName: String

  """
  A URL linking to the thread in the external service. For example, a Slack
  message permalink, a Jira issue URL, or a GitHub issue URL.
  """
  url: String

  """
  Whether this thread is currently syncing comments bidirectionally with the
  external service. False if the external entity relation has been removed or if
  the thread was explicitly unsynced.
  """
  isConnected: Boolean!

  """
  Whether the current user has a working personal integration connected for the
  external service. For example, whether they have connected their personal
  Jira, GitHub, or Slack account. A connected personal integration may still
  return false if it has an authentication error.
  """
  isPersonalIntegrationConnected: Boolean!

  """
  Whether a connected personal integration is required to post comments in this
  synced thread. True for Jira and GitHub threads, where comments must be
  attributed to a specific user in the external system. False for Slack and
  other services where the workspace integration can post on behalf of users.
  """
  isPersonalIntegrationRequired: Boolean!
}

