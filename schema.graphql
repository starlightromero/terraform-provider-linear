"""
A webhook subscription that sends HTTP POST callbacks to an external URL when
events occur in Linear. Webhooks can be scoped to a specific team, multiple
teams, or all public teams in the organization. They support filtering by
resource type (e.g., Issue, Comment, Project) and can be created either manually
by users or automatically by OAuth applications. Each webhook has a signing
secret for verifying payload authenticity on the recipient side.
"""
type Webhook implements Node {
  """The unique identifier of the entity."""
  id: ID!

  """The time at which the entity was created."""
  createdAt: DateTime!

  """
  The last time at which the entity was meaningfully updated. This is the same as the creation time if the entity hasn't
      been updated after creation.
  """
  updatedAt: DateTime!

  """
  The time at which the entity was archived. Null if the entity has not been archived.
  """
  archivedAt: DateTime

  """
  A human-readable label for the webhook, used for identification in the UI. Null if no label has been set.
  """
  label: String

  """
  The destination URL where webhook payloads will be sent via HTTP POST. Null
  for OAuth application webhooks, which use the webhook URL configured on the
  OAuth client instead.
  """
  url: String

  """
  Whether the webhook is enabled. When disabled, no payloads will be delivered even if matching events occur.
  """
  enabled: Boolean!

  """
  The single team that the webhook is scoped to. When null, the webhook either
  targets all public teams (if allPublicTeams is true), multiple specific teams
  (if teamIds is set), or organization-wide events.
  """
  team: Team

  """
  [INTERNAL] An array of team IDs that the webhook is subscribed to. Used to
  represent a webhook that targets multiple specific teams, potentially in
  addition to all public teams (when allPublicTeams is also true). Null when the
  webhook targets a single team via teamId or all public teams only.
  """
  teamIds: [String!]

  """
  Whether the webhook receives events from all public (non-private) teams in the
  organization, including teams created after the webhook was set up. When true,
  the webhook automatically covers new public teams without requiring
  reconfiguration.
  """
  allPublicTeams: Boolean!

  """The user who created the webhook."""
  creator: User

  """
  A secret token used to sign webhook payloads with HMAC-SHA256, allowing the
  recipient to verify that the payload originated from Linear and was not
  tampered with. Automatically generated if not provided during creation.
  """
  secret: String

  """
  The resource types this webhook is subscribed to (e.g., 'Issue', 'Comment',
  'Project', 'Cycle'). The webhook will only receive payloads for events
  affecting these resource types.
  """
  resourceTypes: [String!]!

  """
  [INTERNAL] Webhook failure events associated with the webhook (last 50).
  """
  failures: [WebhookFailureEvent!]!
}

type WebhookConnection {
  edges: [WebhookEdge!]!
  nodes: [Webhook!]!
  pageInfo: PageInfo!
}

"""Input for creating a new webhook."""
input WebhookCreateInput {
  """Label for the webhook."""
  label: String

  """
  The identifier in UUID v4 format. If none is provided, the backend will generate one.
  """
  id: String

  """Whether this webhook is enabled."""
  enabled: Boolean = true

  """A secret token used to sign the webhook payload."""
  secret: String

  """The URL that will be called on data changes."""
  url: String!

  """List of resources the webhook should subscribe to."""
  resourceTypes: [String!]!

  """The identifier or key of the team associated with the Webhook."""
  teamId: String

  """Whether this webhook is enabled for all public teams."""
  allPublicTeams: Boolean
}

type WebhookEdge {
  node: Webhook!

  """Used in `before` and `after` args"""
  cursor: String!
}

"""
A record of a failed webhook delivery attempt. Created when a webhook payload
could not be successfully delivered to the destination URL, either due to an
HTTP error response or a network failure. Each failure event captures the HTTP
status code (if available), the response body or error message, and a stable
execution ID that is shared across retries of the same delivery.
"""
type WebhookFailureEvent {
  """The unique identifier of the entity."""
  id: ID!

  """The time at which the entity was created."""
  createdAt: DateTime!

  """The webhook that this failure event is associated with."""
  webhook: Webhook!

  """The URL that the webhook was trying to push to."""
  url: String!

  """
  The HTTP status code returned by the webhook recipient. Null if the request
  failed before receiving a response (e.g., DNS resolution failure, connection timeout).
  """
  httpStatus: Float

  """
  The HTTP response body returned by the recipient, or the error message if the
  request failed before receiving a response. Truncated to 1000 characters.
  """
  responseOrError: String

  """
  A stable identifier for the webhook delivery attempt. This ID remains the same
  across retries of the same payload, making it useful for correlating multiple
  failure events that belong to the same logical delivery.
  """
  executionId: String!
}

"""The result of a webhook mutation."""
type WebhookPayload {
  """The identifier of the last sync operation."""
  lastSyncId: Float!

  """The webhook entity being mutated."""
  webhook: Webhook!

  """Whether the operation was successful."""
  success: Boolean!
}

"""The result of a webhook secret rotation mutation."""
type WebhookRotateSecretPayload {
  """The identifier of the last sync operation."""
  lastSyncId: Float!

  """Whether the operation was successful."""
  success: Boolean!

  """The new webhook signing secret."""
  secret: String!
}

"""Input for updating an existing webhook."""
input WebhookUpdateInput {
  """Label for the webhook."""
  label: String

  """A secret token used to sign the webhook payload."""
  secret: String

  """Whether this webhook is enabled."""
  enabled: Boolean

  """The URL that will be called on data changes."""
  url: String

  """List of resources the webhook should subscribe to."""
  resourceTypes: [String!]
}

