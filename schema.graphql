"""
A facet representing a join between entities. Facets connect a custom view to an
owning entity such as a project, initiative, team page, workspace page, or user
feed. They control the order of views within their parent via the sortOrder
field. Exactly one source entity and one target entity must be set.
"""
type Facet implements Node {
  """The unique identifier of the entity."""
  id: ID!

  """The time at which the entity was created."""
  createdAt: DateTime!

  """
  The last time at which the entity was meaningfully updated. This is the same as the creation time if the entity hasn't
      been updated after creation.
  """
  updatedAt: DateTime!

  """
  The time at which the entity was archived. Null if the entity has not been archived.
  """
  archivedAt: DateTime

  """
  The sort order of the facet within its owning entity scope. Lower values
  appear first. Sort order is scoped by the source entity (e.g., all facets on a
  project are sorted independently from facets on an initiative).
  """
  sortOrder: Float!

  """
  The owning organization. Set for workspace-level facets that are not scoped to a specific team, project, or initiative.
  """
  sourceOrganization: Organization

  """
  The owning team. Set when this facet represents a view on a team-level page.
  """
  sourceTeam: Team

  """
  The owning project. Set when this facet represents a view tab on a project.
  """
  sourceProject: Project

  """
  The owning initiative. Set when this facet represents a view tab on an initiative.
  """
  sourceInitiative: Initiative

  """
  The user whose feed this facet belongs to. Set when this facet represents a view in a user's personal feed.
  """
  sourceFeedUser: User

  """
  The fixed page type (e.g., projects, issues) that this facet is displayed on.
  Used together with sourceOrganizationId or sourceTeamId to place a view on a
  specific page at the workspace or team level.
  """
  sourcePage: FacetPageSource

  """
  The custom view that this facet points to. Each facet targets exactly one
  custom view, establishing a one-to-one relationship.
  """
  targetCustomView: CustomView
}

type FacetConnection {
  edges: [FacetEdge!]!
  nodes: [Facet!]!
  pageInfo: PageInfo!
}

type FacetEdge {
  node: Facet!

  """Used in `before` and `after` args"""
  cursor: String!
}

