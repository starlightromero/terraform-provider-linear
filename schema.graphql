"""
The billing subscription of a workspace. Represents an active paid plan (e.g.,
Basic, Business, Enterprise) backed by a Stripe subscription. If a workspace has
no Subscription record, it is on the free plan. Only one active subscription per
workspace is expected.
"""
type PaidSubscription implements Node {
  """The unique identifier of the entity."""
  id: ID!

  """The time at which the entity was created."""
  createdAt: DateTime!

  """
  The last time at which the entity was meaningfully updated. This is the same as the creation time if the entity hasn't
      been updated after creation.
  """
  updatedAt: DateTime!

  """
  The time at which the entity was archived. Null if the entity has not been archived.
  """
  archivedAt: DateTime

  """
  The subscription plan type (e.g., basic, business, enterprise). Determines the
  feature set and pricing tier for the workspace.
  """
  type: String!

  """
  The number of seats (active members) in the subscription. This is the raw
  count before applying minimum and maximum seat limits.
  """
  seats: Float!

  """
  The minimum number of seats that will be billed in the subscription. The
  billed seat count will never go below this value even if actual member count
  is lower. Null if no minimum is enforced.
  """
  seatsMinimum: Float

  """
  The maximum number of seats that will be billed in the subscription. The
  billed seat count will never exceed this value even if actual member count is
  higher. Null if no maximum is enforced.
  """
  seatsMaximum: Float

  """
  The user who initially created (purchased) the subscription. Null if the creator has been removed from the workspace.
  """
  creator: User

  """The workspace that the subscription is associated with."""
  organization: Organization!

  """
  The billing collection method for this subscription. 'automatic' means the
  payment method on file is charged automatically. 'send_invoice' means invoices
  are sent to the billing email for manual payment.
  """
  collectionMethod: String!

  """
  The date the subscription was canceled. Null if the subscription has not been canceled.
  """
  canceledAt: DateTime

  """
  The date the subscription is scheduled to be canceled in the future. Null if
  no cancellation is scheduled. The subscription remains active until this date.
  """
  cancelAt: DateTime

  """
  The subscription plan type that the workspace is scheduled to change to at the
  next billing cycle. Null if no plan change is pending.
  """
  pendingChangeType: String

  """
  The date the subscription will be billed next. Null if the subscription is canceled or has no upcoming billing date.
  """
  nextBillingAt: DateTime
}

